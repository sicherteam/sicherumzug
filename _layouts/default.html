<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    :root {
      --primary-color: #0d6efd;
      --secondary-color: #6c757d;
      --dark-color: #212529;
      --light-color: #f8f9fa;
      --success-color: #198754;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: var(--dark-color);
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo {
      font-weight: bold;
      font-size: 1.5rem;
      color: var(--primary-color);
      text-decoration: none;
    }
    header nav a {
      margin-left: 1rem;
      color: var(--dark-color);
      text-decoration: none;
    }
    header nav a:hover {
      color: var(--primary-color);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    /* Hero styles */
    .hero {
      background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
      padding: 4rem 2rem;
      border-radius: 8px;
      margin-bottom: 3rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 2rem;
    }
    .hero-content {
      flex: 1 1 500px;
    }
    .hero h1 {
      font-size: 2.5rem;
      margin-top: 0;
      color: var(--dark-color);
    }
    .hero p {
      font-size: 1.25rem;
      color: var(--secondary-color);
    }
    /* Timeline styles */
    .timeline {
      list-style: none;
      padding: 0;
      position: relative;
    }
    .timeline::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--primary-color);
      left: 20px;
    }
    .timeline-item {
      position: relative;
      margin-bottom: 2rem;
      padding-left: 50px;
    }
    .timeline-item::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid var(--primary-color);
      left: 14px;
      top: 6px;
    }
    .timeline-title {
      font-weight: bold;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }
    /* USP list styles */
    .usp-list {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }
    .usp-list li {
      margin-bottom: 0.75rem;
      position: relative;
      padding-left: 2rem;
      font-weight: 500;
    }
    .usp-list li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--success-color);
      font-weight: bold;
      font-size: 1.2rem;
    }
    /* Card grids */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    .card {
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 1.5rem;
      background: #fff;
      transition: box-shadow 0.3s;
    }
    .card:hover {
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    footer {
      background-color: var(--dark-color);
      color: #fff;
      padding: 3rem 2rem;
      text-align: center;
      margin-top: 4rem;
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">Sicher Team</a>
    <nav>
      <a href="/">Startseite</a>
      <a href="#services">Weitere Services</a>
      <a href="#ratgeber">Ratgeber</a>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <p>&copy; 2026 Sicher Team. Alle Rechte vorbehalten. Ihr Experte für Umzug & Übersiedlung in Österreich.</p>
  </footer>

</body>
</html>
