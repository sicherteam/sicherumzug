{% assign sticky_cta = site.data.cta_variants.sticky | default: site.data.cta_variants.default %}
<div class="fixed bottom-0 left-0 right-0 z-20 border-t border-gray-200 bg-background-light/90 p-4 backdrop-blur-sm dark:border-gray-800 dark:bg-background-dark/80">
  <div class="mx-auto flex w-full max-w-2xl flex-col gap-3 sm:flex-row">
    <a href="tel:{{ site.phone | replace: ' ', '' }}" class="flex flex-1 items-center justify-center gap-2 rounded-lg bg-primary px-5 py-3 text-base font-bold text-white transition hover:scale-[1.01]">
      <span class="material-symbols-outlined">call</span>
      <span class="sm:hidden">{{ sticky_cta.call_label | default: "Jetzt anrufen" }}</span>
      <span class="hidden sm:inline">{{ site.phone }}</span>
    </a>
    <a href="{{ site.whatsapp }}" class="flex flex-1 items-center justify-center gap-2 rounded-lg bg-[#0B6704] px-5 py-3 text-base font-bold text-white transition hover:scale-[1.01]">
      <img src="{{ site.images.whatsapp | relative_url }}" class="h-5 w-5" alt="Chat with us on WhatsApp"/>
      {{ sticky_cta.whatsapp_label | default: "WhatsApp" }}
    </a>
  </div>
  {% if sticky_cta.subtext %}
  <p class="mx-auto mt-2 max-w-2xl text-center text-xs text-text-light">{{ sticky_cta.subtext }}</p>
  {% endif %}
</div>
